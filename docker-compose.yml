version: '3.8'

services:
  # 1. База данных PostgreSQL
  postgres:
    image: mirror.gcr.io/library/postgres:15-alpine
    container_name: shop-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Эмулятор платежного шлюза (Node.js)
  gate-simulator:
    image: mirror.gcr.io/library/node:18-alpine
    container_name: gate-simulator
    working_dir: /app
    volumes:
      - ./gate-simulator:/app
    ports:
      - "9999:9999"
    command: sh -c "npm install && npm start"

  # 3. Основное Java-приложение (AQA Shop)
  aqa-shop:
    image: mirror.gcr.io/library/eclipse-temurin:11-jre-alpine
    container_name: aqa-shop
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/app
      - SPRING_DATASOURCE_USERNAME=app
      - SPRING_DATASOURCE_PASSWORD=password
      - PAYMENT_GATE_URL=http://gate-simulator:9999/payment
      - CREDIT_GATE_URL=http://gate-simulator:9999/credit
    command: java -jar aqa-shop.jar
    depends_on:
      postgres:
        condition: service_healthy
      gate-simulator:
        condition: service_started

volumes:
  pgdata:
